name: CI

on:
  push:
    branches: [main, master, "feat/**"]
  pull_request:

permissions:
  contents: read

env:
  UV_PYTHON: "3.12"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    name: Python lint & types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync workspace
        run: uv sync --frozen
      - name: Lock check
        run: uv lock --check
      - name: Ruff
        run: |
          uv run ruff check packages services infra script tests
          uv run ruff format --check packages services infra script tests
      - name: Mypy
        run: uv run mypy packages services infra
      - name: PDF parser dependency governance
        run: uv run python script/audit_pdf_parser_dependencies.py verify

  python-unit:
    name: Python unit (no Postgres)
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync workspace
        run: uv sync --frozen
      - name: Unit tests (Unix-socket Postgres integration excluded)
        # RSI Atlas rejects TCP libpq hosts; full suite needs local Homebrew PG 17.10.
        # See CONTRIBUTING.md. Engine/storage integration tests KeyError without the socket URL.
        run: >
          uv run pytest -q
          packages/contracts/tests
          packages/security/tests
          packages/models/tests
          packages/engineering/tests
          packages/evaluation/tests
          packages/release/tests
          packages/observability/tests
          packages/document_worker/tests
          packages/collectors/tests
          packages/research/tests
          packages/monitoring/tests
          packages/recovery/tests
          packages/storage/tests/test_database_policy.py
          packages/storage/tests/test_artifact_store.py
          services/engine/tests/test_runtime.py
          services/engine/tests/test_diagnostics.py
          services/engine/tests/test_cli.py
          tests
          --ignore=infra/security/tests

  swift-macos:
    name: Swift package and document-worker containment tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync workspace
        run: uv sync --frozen
      - name: macOS security and document-worker containment
        run: uv run pytest -q infra/security/tests
      - name: Swift test
        run: swift test --package-path apps/macos
      - name: Swift build product
        run: swift build --package-path apps/macos --product RSIAtlas

  # Full PostgreSQL integration is intentionally not CI-gated: it needs the project-owned
  # Unix-socket PostgreSQL 17.10/pgvector runtime. Signed release checks are also excluded:
  # Apple Developer credentials, packaging, notarization, and clean-install proof remain owner gates.
