[build-system]
requires = ["hatchling==1.31.0"]
build-backend = "hatchling.build"

[project]
name = "rsi-atlas-collectors"
version = "0.1.0"
description = "Offline fixture collectors, observation pipeline, and optional monitored live HTTPS"
license = "Apache-2.0"
requires-python = ">=3.11,<3.15"
dependencies = [
  "rsi-atlas-contracts==0.1.0",
  "rsi-atlas-security==0.1.0",
]

[project.optional-dependencies]
duckdb = [
  "duckdb>=1.2.0,<2",
]

