[build-system]
requires = ["hatchling==1.31.0"]
build-backend = "hatchling.build"

[project]
name = "rsi-atlas-ingestion"
version = "0.1.0"
description = "Fail-closed document acquisition and admission policy"
requires-python = ">=3.11,<3.15"
dependencies = [
  "rsi-atlas-contracts==0.1.0",
  "rsi-atlas-document-worker==0.1.0",
]

[project.optional-dependencies]
onnx = [
    "onnxruntime>=1.20.0,<2",
]
